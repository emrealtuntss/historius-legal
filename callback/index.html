<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Authorization Callback — Historius</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            max-width: 640px;
            margin: 60px auto;
            padding: 0 24px;
            line-height: 1.6;
            color: #222;
            background: #fafafa;
        }
        h1 { border-bottom: 1px solid #ddd; padding-bottom: 8px; }
        .box {
            background: #111;
            color: #fff;
            padding: 16px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 14px;
            word-break: break-all;
            margin: 16px 0;
        }
        button {
            background: #0066cc;
            color: #fff;
            border: 0;
            padding: 10px 18px;
            border-radius: 4px;
            font-size: 15px;
            cursor: pointer;
        }
        button:hover { background: #0052a3; }
        .error { color: #c00; font-weight: bold; }
        .success { color: #060; font-weight: bold; }
        .meta { color: #666; font-size: 13px; }
    </style>
</head>
<body>
    <h1>TikTok Authorization Callback</h1>
    <div id="result"></div>
    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            const code = params.get("code");
            const state = params.get("state");
            const error = params.get("error");
            const errorDescription = params.get("error_description");
            const box = document.getElementById("result");

            if (error) {
                box.innerHTML = `
                    <p class="error">Authorization failed: ${error}</p>
                    <p>${errorDescription || ""}</p>
                    <p class="meta">You can close this tab.</p>`;
                return;
            }
            if (!code) {
                box.innerHTML = `
                    <p class="error">No authorization code found in the URL.</p>
                    <p class="meta">This page should only be reached via the TikTok OAuth redirect.</p>`;
                return;
            }

            const payload = JSON.stringify({ code: code, state: state });

            box.innerHTML = `
                <p class="success">✓ Authorization received.</p>
                <p>Copy the line below and paste it into the terminal where you ran <code>python3 tiktok_auth.py</code>:</p>
                <div class="box" id="code-block">${payload}</div>
                <button id="copy-btn">Copy to clipboard</button>
                <p class="meta">You can close this tab after copying.</p>`;

            document.getElementById("copy-btn").addEventListener("click", async () => {
                try {
                    await navigator.clipboard.writeText(payload);
                    document.getElementById("copy-btn").textContent = "Copied ✓";
                } catch (e) {
                    // Fallback: select the text
                    const range = document.createRange();
                    range.selectNode(document.getElementById("code-block"));
                    window.getSelection().removeAllRanges();
                    window.getSelection().addRange(range);
                }
            });
        })();
    </script>
</body>
</html>
